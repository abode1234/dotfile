# #######################################################################################
# Hyprland Configuration for a Windows / Komorebi User
# #######################################################################################

# #######################################################################################
# MONITORS & PROGRAMS
# #######################################################################################
monitor=,preferred,auto,1

# Set programs that you use
$terminal = ghostty
$fileManager = thunar
$menu = rofi -show drun

# #######################################################################################
# AUTOSTART
# #######################################################################################
# Programs to launch on startup
exec-once = waybar &
exec-once = sleep 5 && hyprpaper &
exec-once = nm-applet --indicator & # System tray icon for network management
exec-once = wl-paste --type text --watch cliphist store # Stores text history
exec-once = wl-paste --type image --watch cliphist store # Stores image history
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets
# #######################################################################################
# ENVIRONMENT VARIABLES
# #######################################################################################
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GTK_THEME,Adwaita-dark
env = QT_STYLE_OVERRIDE,adwaita-dark
env = COLORSCHEME,dark

# #######################################################################################
# LOOK & FEEL
# #######################################################################################
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(56949fee) rgba(907aa9ee) 45deg
    col.inactive_border = rgba(f2e9e1ee)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# #######################################################################################
# INPUT
# #######################################################################################
input {
    kb_layout = us,ara
    follow_mouse = 1
     kb_options = grp:win_space_toggle
    touchpad {
        natural_scroll = no
    }
    sensitivity = 0
}

# #######################################################################################
# KEYBINDINGS
# #######################################################################################
$mainMod = SUPER

# Launch Apps
bind = SUPER, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu

# Open URLs as apps
bind = $mainMod, W, exec, brave --app=https://supercell.ejaferp.com/web#menu_id=314&cids=1&action=444&active_id=57&model=helpdesk.ticket&view_type=kanban
bind = $mainMod, O, exec, brave --app=https://outlook.office.com/mail/

# Screen Brightness controls
binde =$mainMod , F2 , exec, brightnessctl set +5%
binde =$mainMod ,F3 , exec, brightnessctl set -5%

# Close window
bind = $mainMod, Q, killactive,

# Focus windows (using h,j,k,l)
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Move windows (using h,j,k,l)
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

# Move to another MONITORS
# move focused window to the next monitor
bind = ALT, 1 , focusmonitor, l
bind = ALT, 2 , focusmonitor, r
# Promote window to master
bind = $mainMod SHIFT, RETURN, layoutmsg, swapwithmaster

# Switch workspaces (Workspaces are 1-indexed in Hyprland)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8

# Resize windows (using - and =)
binde = $mainMod, EQUAL, resizeactive, 20 0
binde = $mainMod, MINUS, resizeactive, -20 0
binde = $mainMod SHIFT, EQUAL, resizeactive, 0 20
binde = $mainMod SHIFT, MINUS, resizeactive, 0 -20

# Manipulate windows
bind = ALT SHIFT, F, fullscreen, 1 # 0 toggles real fullscreen
bind = $mainMod SHIFT, F, fullscreen, 0 # 0 toggles real fullscreen

# Flip layout (toggles the split direction in dwindle layout)
bind = $mainMod, Y, layoutmsg, togglesplit

# Wallpaper picker
bind = $mainMod, B, exec, ~/.config/hypr/wallpaper-picker.sh

# Power button → lock screen
bindl = , XF86PowerOff, exec, hyprlock

# Power menu
bind = $mainMod, P, exec, ~/.config/hypr/power-menu.sh

# Reload Waybar
bind = $mainMod SHIFT, R, exec, killall -SIGUSR2 waybar

# Exit Hyprland
bind = $mainMod, M, exit,

# Screenshots (Save to File and Copy to Clipboard)
bind = ALT, TAB, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png && wl-copy < ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = ALT SHIFT, TAB, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png && wl-copy < ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = ALT CTRL, TAB, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png && wl-copy < ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png


# Clipboard history
bind = SUPER, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Move/resize windows with mainMod + mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
